name: Library Publish

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: library-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish:
    name: Publish to Maven Central
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Validate release secrets
        shell: bash
        env:
          MAVEN_CENTRAL_USERNAME: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          MAVEN_CENTRAL_PASSWORD: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          SIGNING_IN_MEMORY_KEY: ${{ secrets.SIGNING_IN_MEMORY_KEY }}
          SIGNING_IN_MEMORY_KEY_PASSWORD: ${{ secrets.SIGNING_IN_MEMORY_KEY_PASSWORD }}
        run: |
          for name in MAVEN_CENTRAL_USERNAME MAVEN_CENTRAL_PASSWORD SIGNING_IN_MEMORY_KEY SIGNING_IN_MEMORY_KEY_PASSWORD; do
            if [[ -z "${!name}" ]]; then
              echo "::error::Missing required secret: $name"
              exit 1
            fi
          done

      - name: Show publication version
        shell: bash
        run: |
          VERSION_NAME="$(sed -n 's/^VERSION_NAME=//p' gradle.properties)"
          GROUP_ID="$(sed -n 's/^GROUP=//p' gradle.properties)"
          ARTIFACT_ID="$(sed -n 's/^POM_ARTIFACT_ID=//p' gradle.properties)"
          echo "Publishing ${GROUP_ID}:${ARTIFACT_ID}:${VERSION_NAME}"

      - name: Publish and release
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.SIGNING_IN_MEMORY_KEY }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.SIGNING_IN_MEMORY_KEY_PASSWORD }}
        # This task builds the release publication and uploads it to Maven Central in one run.
        run: ./gradlew :collapsingtoolbar:publishAndReleaseToMavenCentral --stacktrace
